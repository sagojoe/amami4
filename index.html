<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amami Oshima - 横スクロール</title>
    <style>
        /* 全体の設定：縦スクロールを禁止し、横スクロールにする */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: "Yu Mincho", "YuMincho", "MS Mincho", serif;
            overflow-y: hidden; /* 縦スクロールを消す */
            overflow-x: auto;   /* 横スクロールを許可 */
        }

        /* 画面いっぱいの横長コンテナ */
        .wrapper {
            display: flex;
            flex-direction: row; /* 横に並べる */
            height: 100vh;
            width: max-content;  /* 中身の分だけ横幅を広げる */
        }

        /* 各写真セクションの設定 */
        .section {
            position: relative;
            height: 100vh;
            width: 100vw; /* 1枚ごとに画面幅100%を占有 */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* 文字を右側に配置するための設定（ほぼ日風） */
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            padding-left: 10%; /* 右から左へ進むので、左側に余白を持たせる */
            box-sizing: border-box;
        }

        /* 背景写真（ファイル名を正確に） */
        .bg1 { background-image: url('photo1.jpg'); }
        .bg2 { background-image: url('photo2.jpg'); }
        .bg3 { background-image: url('photo3.jpg'); }

        /* 文字の設定：ほぼ日風（縦書き・薄く・右から左へ） */
        .content {
            writing-mode: vertical-rl; /* 縦書き（右から左） */
            color: rgba(255, 255, 255, 0.6); /* 白の60%（薄め） */
            font-size: 2.5rem; /* 大きめ */
            font-weight: bold;
            letter-spacing: 0.4em; /* 文字の間隔を広げる */
            line-height: 2;        /* 行間を広げる */
            text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
            height: 70%; /* 縦の表示領域 */
        }

        /* マウスホイールで横スクロールさせるための調整（PC用） */
        /* ※最近のブラウザやトラックパッドならこれなしでも横に動きます */
    </style>
</head>
<body>

    <div class="wrapper">

        <!-- 1枚目（ここからスタート） -->
        <div class="section bg1">
            <div class="content">
                <p>静寂の島、奄美。</p>
                <p>光と影が織りなす、最初の景色。</p>
            </div>
        </div>

        <!-- 2枚目（右にスクロールすると現れる） -->
        <div class="section bg2">
            <div class="content">
                <p>深い森の奥へ。</p>
                <p>都会の音を忘れる時間。</p>
            </div>
        </div>

        <!-- 3枚目 -->
        <div class="section bg3">
            <div class="content">
                <p>ではここなのか
                　　この島なのか
                    脳漿の中を泳ぎ回って
                    一瞬見事に輝き渡る
                    千匹の疑問の稚魚の群棲
                    風が立ち上がり
                    椰子の葉がざわざわ
                    ここなのか</p>
                <p></p>
            </div>
        </div>

    </div>

</body>
</html>
