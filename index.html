<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波がひたす
        　　時が満たす
    　　　　 ゆっくりと日時計
        　　 潮の暦日</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: "Yu Mincho", "YuMincho", "MS Mincho", serif; /* 縦書きには明朝体が合います */
        }

        /* セクション設定：写真をフル画面固定 */
        .section {
            position: relative;
            height: 100vh;
            width: 100%;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 背景写真の指定（ファイル名を正確に合わせる） */
        .bg1 { background-image: url('photo1.jpg'); }
        .bg2 { background-image: url('photo2.jpg'); }
        .bg3 { background-image: url('photo3.jpg'); }

        /* 文字の設定：縦書き・大きく・薄く */
        .content {
            writing-mode: vertical-rl; /* 縦書き（右から左へ） */
            text-orientation: mixed;
            color: rgba(255, 255, 255, 0.6); /* 白の60%の薄さ */
            font-size: 3.5rem; /* かなり大きめ */
            font-weight: bold;
            letter-spacing: 0.5em; /* 文字の間隔を広げてゆったりと */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3); /* 視認性確保のための影 */
            height: 80%; /* 縦の表示範囲 */
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .section { background-attachment: scroll; } /* スマホは固定解除がスムーズ */
            .content {
                font-size: 2.2rem;
                letter-spacing: 0.3em;
            }
        }
    </style>
</head>
<body>

    <div class="section bg1">
        <div class="content">
            波がひたす
        　　 時が満たす
    　　　　  ゆっくりと日時計
        　　 潮の暦日
        </div>
    </div>

    <div class="section bg2">
        <div class="content">
            kakeroma, romanesque
        </div>
    </div>

    <div class="section bg3">
        <div class="content">
            揺れている、ぬるい浅い水。
        </div>
    </div>

</body>
</html>
