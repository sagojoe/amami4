<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amami Oshima - Scroll Story</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
        }

        /* 背景写真を固定する設定 */
        .section {
            position: relative;
            height: 100vh; /* 画面いっぱいの高さ */
            background-attachment: fixed; /* これで写真が固定される */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 1枚目の写真 */
        .bg1 { background-image: url('photo1.jpg'); }
        /* 2枚目の写真 */
        .bg2 { background-image: url('photo2.jpg'); }
        /* 3枚目の写真 */
        .bg3 { background-image: url('photo3.jpg'); }

        /* 文字の設定 */
        .content {
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.3); /* 文字を読みやすくするために少し暗く */
            padding: 20px 40px;
            width: 100%;
        }

        h1 { font-size: 2.5rem; margin: 0; letter-spacing: 0.2em; }
        p { font-size: 1.1rem; line-height: 1.8; }

        /* スマホで見るときは固定を解除（動作を軽くするため） */
        @media (max-width: 768px) {
            .section { background-attachment: scroll; }
        }
    </style>
</head>
<body>

    <div class="section bg1">
        <div class="content">
            <h1>奄美大島</h1>
            <p>静寂の中に響く、波の音。ここから旅が始まる。</p>
        </div>
    </div>

    <div class="section bg2">
        <div class="content">
            <h1>原生林の息吹</h1>
            <p>深い緑。都会では味わえない、濃密な空気。</p>
        </div>
    </div>

    <div class="section bg3">
        <div class="content">
            <h1>奄美ブルー</h1>
            <p>ただ海を見ているだけで、時間が溶けていく。</p>
        </div>
    </div>

</body>
</html>
